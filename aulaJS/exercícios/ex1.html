<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exercício 1 - Dados Pessoais</title>
</head>
<body>
    <h1>Dados Pessoais</h1>
    
    <script>
        let nome = prompt("Digite seu nome:");
        let idade = prompt("Digite sua idade:");
        let endereco = prompt("Digite seu endereço:");
        let cep = prompt("Digite seu CEP:");
        let cpf = prompt("Digite seu CPF:");
        
        document.write("<h2>Dados informados:</h2>");
        document.write("Nome: " + nome + "<br>");
        document.write("Idade: " + idade + "<br>");
        document.write("Endereço: " + endereco + "<br>");
        document.write("CEP: " + cep + "<br>");
        document.write("CPF: " + cpf + "<br>");
    </script>
</body>
</html>
