<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exercício 2 - Maior de 3 Números</title>
</head>
<body>
    <h1>Maior de 3 Números</h1>
    
    <script>
        let n1 = Number(prompt("Digite o primeiro número:"));
        let n2 = Number(prompt("Digite o segundo número:"));
        let n3 = Number(prompt("Digite o terceiro número:"));
        
        let maior = Math.max(n1, n2, n3);
    
        document.write("<h2>Resultado:</h2>");
        document.write("Números informados: " + n1 + ", " + n2 + ", " + n3 + "<br>");
        document.write("O maior número é: " + maior);
    </script>
</body>
</html>
