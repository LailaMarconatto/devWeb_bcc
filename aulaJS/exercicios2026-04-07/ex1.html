<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 1 - dia da semana</title>
</head>
<body>
    <h1>Dia da Semana</h1>

    <script>
        let num = prompt("Digite o numero do dia da semana: ")

        switch(num){
          case "1":
            document.write("Domingo")
            break
          case "2":
            document.write("Segunda")
            break
          case "3":
            document.write("Terça")
            break
          case "4":
            document.write("Quarta")
            break
          case "5":
            document.write("Quinta")
            break
          case "6":
            document.write("Sexta")
            break
          case "7":
            document.write("Sabado")
            break
          default:
            alert("valor invalido!")
        }
    </script>
</body>
</html>
