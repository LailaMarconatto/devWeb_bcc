<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 2 - paridade dos numeros</title>
</head>
<body>
   <h1>É par?</h1> 

   <script>
        let num = prompt("Insira um número: ")

        switch(num % 2) {
            case 0:
                document.write("O numero "+num+" é par")
                break
            default:
                document.write("O numero "+num+" não é par")
        }
   </script>
</body>
</html>
